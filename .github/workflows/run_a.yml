name: A-Share Screener

on:
  schedule:
    # 每天 UTC 时间 08:30 运行 (北京时间下午 4:30，完美避开数据延迟期)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行按钮

# 消除 Node.js 20 老化警告的关键配置！👇
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-a-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials.json
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run A-Share Screener
        run: python run_a.py
