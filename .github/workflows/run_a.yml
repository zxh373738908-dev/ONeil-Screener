name: A-Share Screener

on:
  schedule:
    # 每天 UTC 时间 08:30 运行 (北京时间下午 4:30)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: 

jobs:
  run-a-screener:
    runs-on: ubuntu-latest
    steps:
      # 🚀 升级到 v4，消除 Node.js 20 老化警告
      - name: Checkout code
        uses: actions/checkout@v4

      # 🚀 升级到 v5，提供最稳固的 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials.json
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run A-Share Screener
        run: python run_a.py
